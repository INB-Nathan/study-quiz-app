name: Vercel Production Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Pre-deploy: validate questions.json
  validate:
    name: Validate CSV Import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CSV import
        run: node scripts/csv-to-json.js

      - name: Validate questions.json
        run: |
          node -e \
            "const q=require('./public/questions.json'); \
             if(!Array.isArray(q)||q.length===0){ \
               console.error('FAIL: questions.json is empty'); process.exit(1); \
             } \
             console.log('OK: '+q.length+' questions');"

      - name: Upload questions.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: questions-json
          path: public/questions.json
          retention-days: 1

  # Deploy to Vercel preview on PR
  deploy-preview:
    name: Vercel Preview Deployment
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download questions.json
        uses: actions/download-artifact@v4
        with:
          name: questions-json
          path: public/

      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod=false'

  # Deploy to Vercel production on main
  deploy-production:
    name: Vercel Production Deployment
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download questions.json
        uses: actions/download-artifact@v4
        with:
          name: questions-json
          path: public/

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod=true'
